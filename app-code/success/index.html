<!DOCTYPE html>
<html>
<head>
  <title>Login Success</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 80px;
      background: linear-gradient(to right, #74ebd5, #acb6e5);
      color: #2c3e50;
    }

    .success-container {
      background-color: #ffffffcc;
      padding: 40px;
      border-radius: 10px;
      display: inline-block;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
    }

    .success-container h2 {
      color: #27ae60;
      margin-bottom: 20px;
    }

    .success-container p {
      font-size: 16px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="success-container">
    <h2>🎉 Login Successful!</h2>
    <p>You have successfully logged into the Kubernetes demo environment.</p>
  </div>
</body>
</html>
